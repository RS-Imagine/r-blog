<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A personal blog built from Markdown content and published as static pages.">
  <title>r-blog</title>
  <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}, {left: '\\[', right: '\\]', display: true}, {left: '\\(', right: '\\)', display: false}], throwOnError: false});"></script>
</head>
<body>
  <main class="wrapper">
    <header class="site-header">
      <div class="site-brand">
        <h1>r-blog</h1>
        <p>A personal blog built from Markdown content and published as static pages.</p>
      </div>
      <nav class="site-nav" aria-label="Primary">
        <a href="/">Home</a>
      </nav>
    </header>
    <section class="hero">
  <span class="tag">Your Name</span>
  <h1>r-blog</h1>
  <p>Rust, Markdown, and a free-tier friendly publishing flow</p>
</section>
<section class="grid">
  <article class="post-card">
  <div class="meta">2026-06-10</div>
  <h2><a href="/posts/testpost/">This is A TEST POST</a></h2>
  <p>testpost</p>
</article><article class="post-card">
  <div class="meta">2026-06-10</div>

  <p>test latex</p>
</article>
</section>
    <footer>Built with Rust and Markdown.</footer>
  </main>
</body>
</html>
